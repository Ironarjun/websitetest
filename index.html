
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AES UF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- GOOGLE FONT (optional but recommended) -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
    }

    /* ================= HEADER ================= */
    .header {
      background: black;
      padding: 15px 30px;
      display: flex;
      align-items: center;
      position: sticky; /* makes it stay on scroll */
      top: 0;
      z-index: 1000;
    }

    .logo {
      height: 50px; /* CHANGE size if needed */
    }

    /* ================= NAV ================= */
    .nav {
      background: #eee;
      padding: 10px 30px;
    }

    .nav a {
      margin-right: 20px;
      text-decoration: none;
      color: black;
      font-size: 14px;
    }

    /* ================= HERO ================= */
    .hero {
      display: flex;
      height: 85vh;
    }

    /* LEFT SIDE IMAGE */
    .left {
      width: 50%;
      background-image: url("images/aeshome.png"); 
      /* 🔥 CHANGE THIS to your image file name */

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    /* RIGHT SIDE CONTENT */
    .right {
      width: 50%;
      background: #0b0b2d;
      color: white;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* BIG AES LOGO */
    .aes-logo {
      width: 160px; 
      /* 🔥 CHANGE size if needed */

      margin-bottom: 20px;
    }

    .right h1 {
      font-size: 42px;
      margin: 10px 0;
    }

    .right p {
      opacity: 0.8;
    }

    ul {
      padding-left: 20px;
    }

    li {
      margin-bottom: 10px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: white;
      color: black;
      border-radius: 25px;
      width: fit-content;
      text-decoration: none;
      font-weight: 600;
    }

    /* ================= MOBILE ================= */
    @media (max-width: 768px) {
      .hero {
        flex-direction: column;
      }

      .left, .right {
        width: 100%;
        height: 50vh;
      }
    }

  </style>
</head>

<body>

  <!-- ================= HEADER ================= -->
  <div class="header">
    <img src="images/aes_shield.png" class="logo">
    <!-- 🔥 CHANGE this to your top-left logo file -->
  </div>

  <!-- ================= NAV ================= -->
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="#">Information</a>
    <a href="#">Contact</a>
    <a href="#">Project posts</a>
    <a href="#">Donations</a>
    <a href="#">Partnerships</a>
  </div>

  <!-- ================= HERO ================= -->
  <div class="hero">

    <!-- LEFT BIG IMAGE -->
    <div class="left"></div>

    <!-- RIGHT PANEL -->
    <div class="right">

      <!-- BIG AES SHIELD -->
      <img src="images/aes_logo.png" class="aes-logo">
      <!-- 🔥 CHANGE to your AES shield PNG -->

      <p>Welcome to the</p>

      <h1>Audio Engineering Society</h1>

      <p>at the University of Florida</p>

      <ul>
        <li>🎸 Workshops</li>
        <li>🎸 Tech talks</li>
        <li>🎸 Socials</li>
        <li>🎸 Open to all majors and experience</li>
      </ul>

      <a href="#" class="btn">Let's Chat!</a>

    </div>

  </div>

</body>
</html>
