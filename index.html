<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AES UF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    /* HEADER */
    .header {
      background: black;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: bold;
      font-size: 20px;
    }

    /* NAVBAR */
    .nav {
      background: #eee;
      padding: 10px 30px;
    }

    .nav a {
      margin-right: 20px;
      text-decoration: none;
      color: black;
    }

    /* HERO SECTION */
    .hero {
      display: flex;
      height: 80vh;
    }

    .left {
      width: 50%;
      background: url('your-image.jpg') center/cover no-repeat;
    }

    .right {
      width: 50%;
      background: #0b0b2d;
      color: white;
      padding: 60px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .right h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: white;
      color: black;
      border-radius: 25px;
      width: fit-content;
      text-decoration: none;
    }

  </style>
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">AES UF</div>
    <div>🔔 ⚙️</div>
  </div>

  <!-- NAV -->
  <div class="nav">
    <a href="#">Home</a>
    <a href="#">Information</a>
    <a href="#">Contact</a>
    <a href="#">Project posts</a>
    <a href="#">Donations</a>
    <a href="#">Partnerships</a>
  </div>

  <!-- HERO -->
  <div class="hero">

    <!-- LEFT IMAGE -->
    <div class="left"></div>

    <!-- RIGHT CONTENT -->
    <div class="right">
      <p>Welcome to the</p>
      <h1>Audio Engineering Society</h1>
      <p>at the University of Florida</p>

      <ul>
        <li>🎸 Workshops</li>
        <li>🎸 Tech talks</li>
        <li>🎸 Socials</li>
        <li>🎸 Open to all majors</li>
      </ul>

      <a href="#" class="btn">Let's Chat!</a>
    </div>

  </div>

</body>
</html>
