<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Page</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      padding: 50px;
    }

    .left {
      flex: 1 1 40%;
      min-width: 300px;
    }

    .left h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    .left p {
      font-size: 1.2em;
    }

    .left a img {
      width: 50px;
      height: 50px;
      margin-left: 10px;
      vertical-align: middle;
      cursor: pointer;
    }

    .right {
      flex: 1 1 50%;
      min-width: 300px;
      background-color: #111;
      padding: 30px;
      border-radius: 5px;
    }

    .right form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .right input, .right textarea {
      width: 100%;
      padding: 10px;
      background-color: #000;
      border: 1px solid #fff;
      color: #fff;
      border-radius: 3px;
    }

    .right textarea {
      grid-column: span 2;
      resize: vertical;
      height: 100px;
    }

    .right button {
      grid-column: span 2;
      padding: 12px;
      background-color: #fff;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 3px;
    }

    .footer {
      text-align: center;
      margin-top: 50px;
      font-size: 0.9em;
    }

    .footer img {
      margin-top: 10px;
      width: 80px;
    }

    @media(max-width: 800px) {
      .container {
        flex-direction: column;
      }
      .right form {
        grid-template-columns: 1fr;
      }
      .right textarea {
        grid-column: span 1;
      }
      .right button {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="left">
      <h1>Give Us Your <br>Feedback</h1>
      <p>Visit our Instagram page! 
        <a href="https://www.instagram.com/YOUR_PAGE/" target="_blank">
          <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
        </a>
      </p>
    </div>

    <div class="right">
      <!-- Replace form action with your Formspree URL or backend URL -->
      <form action="https://formspree.io/f/myknabko" method="POST">
        <input type="text" name="name" placeholder="Enter your name" required>
        <input type="email" name="email" placeholder="Enter your email" required>
        <input type="tel" name="phone" placeholder="Enter your phone number">
        <input type="text" name="address" placeholder="Enter your address">
        <input type="text" name="subject" placeholder="Type the subject">
        <textarea name="message" placeholder="Type your message here..." required></textarea>
        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

  <div class="footer">
    A UF AES initiative
    <br>
    <img src="aes_shield.png" alt="AES Logo">
  </div>

</body>
</html>
