<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback Page - AES UF</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #000;
      color: #fff;
    }

    /* ================= HEADER ================= */
    .header {
      background: black;
      display: flex;
      align-items: center;
      padding: 10px 30px;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      height: 50px;
    }

    /* ================= NAVIGATION ================= */
    .nav {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 30px;
      background: white; /* white nav background */
      flex-wrap: wrap;
    }

    .nav a {
      text-decoration: none;
      color: black; /* all links black */
      font-size: 14px;
      padding: 6px 12px;
      border-radius: 4px;
      transition: 0.2s;
      font-weight: 500;
    }

    .nav a:hover {
      background-color: #ddd;
    }

    /* ================= CONTAINER ================= */
    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      padding: 50px;
    }

    .left {
      flex: 1 1 40%;
      min-width: 300px;
    }

    .left h1 {
      font-size: 3em;
      margin-bottom: 20px;
    }

    .left p {
      font-size: 1.2em;
      margin: 10px 0;
    }

    .left a img {
      width: 50px;
      height: 50px;
      margin-left: 10px;
      vertical-align: middle;
      cursor: pointer;
    }

    .right {
      flex: 1 1 50%;
      min-width: 300px;
      background-color: #111;
      padding: 30px;
      border-radius: 5px;
    }

    .right form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    .right input, .right textarea {
      width: 100%;
      padding: 10px;
      background-color: #000;
      border: 1px solid #fff;
      color: #fff;
      border-radius: 3px;
    }

    .right textarea {
      grid-column: span 2;
      resize: vertical;
      height: 100px;
    }

    .right button {
      grid-column: span 2;
      padding: 12px;
      background-color: #fff;
      color: #000;
      border: none;
      cursor: pointer;
      font-weight: bold;
      border-radius: 3px;
    }

    .footer {
      text-align: center;
      margin-top: 50px;
      font-size: 0.9em;
    }

    .footer img {
      margin-top: 10px;
      width: 80px;
    }

    /* ================= MOBILE ================= */
    @media(max-width: 800px) {
      .container {
        flex-direction: column;
      }
      .right form {
        grid-template-columns: 1fr;
      }
      .right textarea {
        grid-column: span 1;
      }
      .right button {
        grid-column: span 1;
      }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <img src="aes_shield.png" class="logo" alt="AES Logo">
  </div>

  <!-- NAVIGATION -->
  <div class="nav">
    <a href="index.html">Home</a>
    <a href="information.html">Information</a>
    <a href="leadership.html">Leadership</a>
    <a href="contact.html">Contact</a>
    <a href="#">Project posts</a>
    <a href="#">Donations</a>
    <a href="#">Partnerships</a>
  </div>

  <!-- MAIN CONTENT -->
  <div class="container">
    <div class="left">
      <h1>Give Us Your <br>Feedback</h1>
      <p>Visit our social pages!</p>

      <!-- Instagram icon -->
      <a href="https://www.instagram.com/uf_aes/" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/e7/Instagram_logo_2016.svg" alt="Instagram">
      </a>

      <!-- Discord icon below Instagram -->
      <br><br>
      <a href="https://discord.gg/ZxNEkEWudQ" target="_blank">
        <img src="discordlogo.png" alt="Discord">
      </a>

      <!-- Instruction text with red arrow -->
      <p style="color: red; font-weight: bold; margin-top: 10px;">&#10148; Click on icons to go there!</p>
    </div>

    <div class="right">
      <!-- Feedback Form -->
      <form action="https://formspree.io/f/myknabko" method="POST">
        <input type="text" name="name" placeholder="Enter your name" required>
        <input type="email" name="email" placeholder="Enter your email" required>
        <input type="tel" name="phone" placeholder="Enter your phone number">
        <input type="text" name="address" placeholder="Enter your address">
        <input type="text" name="subject" placeholder="Type the subject">
        <textarea name="message" placeholder="Type your message here..." required></textarea>
        <button type="submit">Submit</button>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    A UF AES initiative
    <br>
    <img src="aes_shield.png" alt="AES Logo">
  </div>

</body>
</html>
